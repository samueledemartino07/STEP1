<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEP AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <div class="header-bar">
            <div class="logo">
                <img src="assets/logo.png" alt="Logo STEP" /> 
            </div>
            <nav class="nav">
                <a href="#home" class="nav-link">Home</a>
                <a href="#colloquio" class="nav-link">Colloquio</a>
                <a href="#videolezioni" class="nav-link">Videolezioni</a>
                <a href="#cv" class="nav-link">Curriculum Vitae</a>
            </nav>
        </div>
    </header>

    <main id="main-app">

        <section id="start-screen" class="view">
            <h1>Benvenuto su STEP!</h1>
            <p>Seleziona una posizione o simula un colloquio.</p>
            
            <div class="position-input">
                <input type="text" id="position-input" placeholder="Inserisci la posizione (es: 'Sviluppatore Junior')">
                <button id="start-btn">Avvia Simulazione</button>
            </div>

            <div class="version-buttons">
                <button class="version-btn">Versione Base</button>
                <button class="version-btn">Versione Avanzata</button>
            </div>
        </section>

        <section id="colloquio-view" class="view" hidden>
            <h2>Simulazione Colloquio</h2>
            <p id="colloquio-status">Inizia la simulazione per la posizione: [posizione]</p>

            <div class="chat-box">
                <div class="messages">
                    <div class="bubble bot">Ciao! Sono pronto per il tuo colloquio.</div>
                </div>
                <div class="input-row">
                    <input type="text" id="chat-input" placeholder="Scrivi qui la tua risposta..." />
                    <button id="send-btn">Invia</button>
                    <button id="new-q-btn">Nuova Domanda</button>
                </div>
            </div>
        </section>

        <section id="videolezioni-view" class="view" hidden>
            <h2>Videolezioni</h2>
            
            <div class="video-gallery">
                
                <div class="video-item">
                    <h2>Lezione 1</h2>
                    <iframe 
                        id="video-iframe-1" 
                        src="https://www.youtube.com/embed/uqwu_t_puk0" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                </div>

                <div class="video-item">
                    <h2>Lezione 2</h2>
                    <iframe 
                        id="video-iframe-2" 
                        src="https://www.youtube.com/embed/QUdAFDXimmk" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                </div>
                
                </div>
        </section>

    </main>

    <footer class="app-footer">
        © 2025 STEP
    </footer>

    </body>
</html>
